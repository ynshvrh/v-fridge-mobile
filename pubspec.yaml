name: v_fridge
description: "V-Fridge mobile client — Flutter app for the v-fridge-api backend."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP client
  dio: ^5.7.0

  # Secure token storage (Android Keystore / iOS Keychain)
  flutter_secure_storage: ^9.2.2

  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
