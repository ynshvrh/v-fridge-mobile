name: v_fridge
description: "V-Fridge mobile client — Flutter app for the v-fridge-api backend."
publish_to: 'none'

version: 1.4.0+5

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP client
  dio: ^5.7.0

  # Secure token storage (Android Keystore / iOS Keychain)
  flutter_secure_storage: ^9.2.2

  # Non-secret local preferences (theme mode)
  shared_preferences: ^2.3.4

  # Date formatting (pinned to the version flutter_localizations requires)
  intl: ^0.20.2

  # Geist Sans typography — same font family the web client uses
  google_fonts: ^6.2.1

  # Google sign-in (ID-token flow, no Firebase needed)
  google_sign_in: ^6.2.2

  # Barcode scanner (camera + ML-Kit on Android, AVFoundation on iOS)
  mobile_scanner: ^5.2.3
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Generates Android mipmaps, iOS AppIcon.appiconset, and web icons from one PNG.
  # Run with: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon-1024.png"
  # Adaptive icon for Android 8.0+: foreground is the icon, background is the celadon backdrop.
  adaptive_icon_background: "#B5C9A1"
  adaptive_icon_foreground: "assets/icon-1024.png"
  web:
    generate: true
    image_path: "assets/icon-1024.png"
    background_color: "#B5C9A1"
    theme_color: "#8C5383"

flutter:
  uses-material-design: true
  generate: true
