<?xml version="1.0" encoding="UTF-8"?>
<!-- V-Fridge master icon. 1024x1024 master, exported to PNGs for web favicons,
     Android mipmaps, and iOS app icons. Palette mirrors web globals.css:
       celadon:        #B5C9A1
       celadon soft:   #DDEACA
       primary violet: #8C5383
       violet soft:    #6B3F65
       ink:            #2A1E2A  -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" shape-rendering="geometricPrecision">

  <!-- Celadon rounded backdrop. -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="#B5C9A1"/>

  <!-- Soft inner frame. -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180"
        fill="none" stroke="#DDEACA" stroke-width="10" opacity="0.7"/>

  <!-- Fridge body. Centred horizontally; safe inside the Android adaptive 432px circle. -->
  <g transform="translate(232 152)">
    <!-- Drop shadow -->
    <rect x="8" y="16" width="560" height="720" rx="68" ry="68" fill="#2A1E2A" opacity="0.18"/>
    <!-- Cabinet -->
    <rect x="0" y="0" width="560" height="720" rx="68" ry="68" fill="#8C5383"/>

    <!-- Door split: top freezer (smaller) / bottom fridge. -->
    <line x1="32" y1="260" x2="528" y2="260" stroke="#6B3F65" stroke-width="8" stroke-linecap="round"/>

    <!-- Top freezer handle (vertical bar, right side of the compartment). -->
    <rect x="468" y="80" width="18" height="140" rx="9" ry="9" fill="#DDEACA"/>
    <!-- Bottom fridge handle. -->
    <rect x="468" y="320" width="18" height="240" rx="9" ry="9" fill="#DDEACA"/>

    <!-- V monogram on the freezer door. -->
    <path d="M 130 110 L 200 220 L 270 110"
          fill="none" stroke="#DDEACA" stroke-width="34"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Cherry-style accent on the fridge door so it's not just a flat panel:
         a leaf above a small celadon ball, hinting at fresh produce. -->
    <g transform="translate(186 360)">
      <!-- Stem -->
      <path d="M 100 0 Q 100 30 100 60" fill="none" stroke="#DDEACA" stroke-width="6" stroke-linecap="round"/>
      <!-- Leaf -->
      <path d="M 100 20 C 130 0 175 0 180 35 C 165 60 125 60 100 40 Z" fill="#DDEACA"/>
      <path d="M 110 28 Q 130 22 165 30" fill="none" stroke="#8C5383" stroke-width="4" stroke-linecap="round"/>
      <!-- Berry -->
      <circle cx="100" cy="100" r="44" fill="#DDEACA"/>
      <circle cx="86" cy="86" r="10" fill="#FFFFFF" opacity="0.55"/>
    </g>
  </g>
</svg>
