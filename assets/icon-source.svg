<?xml version="1.0" encoding="UTF-8"?>
<!-- V-Fridge master icon, mirrors web at web-platform/public/icon.svg.
     1024x1024 master, exported to assets/icon-1024.png plus Android
     mipmaps and iOS AppIcon set. Palette tracks lib/theme/vf_colors.dart.
       mistral (sky):   #A3DFF1
       zéphir (cream):  #FEE4B8
       solara  (sun):   #FFC065
       pulpe   (juice): #FFA43A -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" shape-rendering="geometricPrecision">

  <!-- Mistral (sky-blue) rounded backdrop. -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="#A3DFF1"/>

  <!-- Soft inner frame in Zéphir cream. -->
  <rect x="80" y="80" width="864" height="864" rx="180" ry="180"
        fill="none" stroke="#FEE4B8" stroke-width="10" opacity="0.75"/>

  <!-- Fridge body. Centred horizontally; safe inside the Android adaptive 432px circle. -->
  <g transform="translate(232 152)">
    <!-- Drop shadow -->
    <rect x="8" y="16" width="560" height="720" rx="68" ry="68" fill="#2A1810" opacity="0.18"/>
    <!-- Cabinet — Pulpe orange. -->
    <rect x="0" y="0" width="560" height="720" rx="68" ry="68" fill="#FFA43A"/>

    <!-- Door split: top freezer (smaller) / bottom fridge. -->
    <line x1="32" y1="260" x2="528" y2="260" stroke="#D17A1E" stroke-width="8" stroke-linecap="round"/>

    <!-- Top freezer handle. -->
    <rect x="468" y="80" width="18" height="140" rx="9" ry="9" fill="#FEE4B8"/>
    <!-- Bottom fridge handle. -->
    <rect x="468" y="320" width="18" height="240" rx="9" ry="9" fill="#FEE4B8"/>

    <!-- V monogram on the freezer door — Zéphir cream. -->
    <path d="M 130 110 L 200 220 L 270 110"
          fill="none" stroke="#FEE4B8" stroke-width="34"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Fresh-produce accent on the fridge door: a leaf above a berry.
         Reworked with the citrus palette — Solara leaf, Mistral berry. -->
    <g transform="translate(186 360)">
      <!-- Stem -->
      <path d="M 100 0 Q 100 30 100 60" fill="none" stroke="#FEE4B8" stroke-width="6" stroke-linecap="round"/>
      <!-- Leaf (Solara) -->
      <path d="M 100 20 C 130 0 175 0 180 35 C 165 60 125 60 100 40 Z" fill="#FFC065"/>
      <path d="M 110 28 Q 130 22 165 30" fill="none" stroke="#D17A1E" stroke-width="4" stroke-linecap="round"/>
      <!-- Berry (Mistral) -->
      <circle cx="100" cy="100" r="44" fill="#A3DFF1"/>
      <circle cx="86" cy="86" r="10" fill="#FFFFFF" opacity="0.55"/>
    </g>
  </g>
</svg>
